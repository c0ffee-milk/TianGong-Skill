# Agent 配置文件 — TianGong-Skill
# 修改此文件后，总控 SKILL.md 会在运行时读取并应用配置
# 修改模型：改 model 字段（haiku/sonnet/opus）
# 增加 detector：在 detectors 下新增条目，总控自动扫描并 spawn
# 增加 generator：在 generators 下新增条目，需在总控对应 Phase 中手动 spawn
# 修改 GAN 参数：调整 gan 下的阈值

# ── 生成组 ──
generators:
  researcher:
    model: haiku
    description: 6维度并行调研，快速、低成本
    skills:
      - web-article-reader
      - agent-reach
      - pdf

  synthesizer:
    model: sonnet
    description: 三重验证提炼心智模型
    skills: []

  builder:
    model: sonnet
    description: 构建/修改 SKILL.md
    skills: []

# ── 评估组 ──
detectors:
  d1-model-purity:
    model: opus
    description: 心智模型纯度审判官
    skills: []

  d2-expression-dna:
    model: opus
    description: 表达DNA盲测官
    skills: []

# ── GAN 循环配置 ──
gan:
  convergence_threshold: 85
  max_iterations: 8
  min_improvement: 5
